<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#110b0e">
<title>2A Activity Game — Draw · Show · Explain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --draw: #ef4444;
    --draw-glow: rgba(239,68,68,0.25);
    --explain: #3b82f6;
    --explain-glow: rgba(59,130,246,0.25);
    --show: #22c55e;
    --show-glow: rgba(34,197,94,0.25);
    --bg: #110b0e;
    --bg2: #1a1015;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --card-hover: rgba(255,255,255,0.07);
    --text: #f1f1f4;
    --text-secondary: #a1a1b5;
    --muted: #6b6b80;
    --accent: #f43f5e;
    --accent-glow: rgba(244,63,94,0.3);
    --gold: #facc15;
    --gold-glow: rgba(250,204,21,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { overscroll-behavior: none; }
  button, input, select { touch-action: manipulation; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(220,38,38,0.18), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(244,63,94,0.08), transparent);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 1.5rem);
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  h1 {
    font-size: 2rem; margin: 1.5rem 0 0.2rem; font-weight: 800;
    letter-spacing: -0.03em;
  }
  h1 span {
    background: linear-gradient(135deg, #f43f5e, #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--muted); font-size: 0.8rem; margin-bottom: 1.2rem;
    letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500;
  }
  .back-link {
    align-self: flex-start; margin: 0.4rem 0 0 1rem; color: var(--muted);
    text-decoration: none; font-size: 0.78rem; font-weight: 500;
    border: 1.5px solid var(--card-border); padding: 0.35rem 0.7rem;
    border-radius: 8px; background: var(--card);
    transition: color 0.15s, border-color 0.15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); }

  /* Screens */
  .screen { display: none; width: 100%; max-width: 480px; padding: 0 1.25rem; }
  .screen.active {
    display: flex; flex-direction: column; align-items: center;
    animation: fadeIn 0.25s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Setup screen */
  .setup-section { width: 100%; margin-bottom: 1.2rem; }
  .setup-section label {
    display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary);
  }
  .setup-section input, .setup-section select {
    width: 100%; padding: 0.7rem 1rem; border-radius: 12px;
    border: 1.5px solid var(--card-border); background: var(--card);
    color: var(--text); font-size: 0.95rem; font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    backdrop-filter: blur(10px);
  }
  .setup-section input:focus, .setup-section select:focus {
    border-color: var(--accent); outline: none;
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .setup-section input::placeholder { color: var(--muted); }
  .group-row {
    display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center;
  }
  .group-row input { flex: 1; }
  .group-row button {
    background: rgba(239,68,68,0.15); border: 1.5px solid rgba(239,68,68,0.3);
    color: #f87171; width: 36px; height: 36px; border-radius: 10px;
    cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .group-row button:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5); }
  .add-group-btn {
    background: var(--card); border: 1.5px dashed var(--card-border); color: var(--muted);
    padding: 0.55rem; border-radius: 12px; cursor: pointer; width: 100%;
    font-size: 0.85rem; font-family: inherit; font-weight: 500;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .add-group-btn:hover {
    border-color: var(--accent); color: var(--text);
    background: rgba(244,63,94,0.05);
  }

  /* Segmented control (time / mode) */
  .seg { display: flex; gap: 0.4rem; }
  .seg-btn {
    flex: 1; padding: 0.7rem 0.4rem; border-radius: 12px;
    border: 1.5px solid var(--card-border); background: var(--card);
    color: var(--text-secondary); cursor: pointer; font-family: inherit;
    font-size: 0.85rem; font-weight: 600; transition: all 0.15s;
  }
  .seg-btn:hover { color: var(--text); border-color: var(--accent); }
  .seg-btn.active {
    background: var(--accent-glow); border-color: var(--accent); color: var(--text);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .seg-btn .seg-icon { display: block; font-size: 1.3rem; line-height: 1; margin-bottom: 0.2rem; }
  .seg-btn .seg-label { font-size: 0.78rem; }

  /* Mode pick — wider tiles with category color when active */
  .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
  .mode-tile {
    padding: 0.85rem 0.5rem; border-radius: 14px; border: 1.5px solid var(--card-border);
    background: var(--card); color: var(--text-secondary); cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: 0.9rem; transition: all 0.15s;
  }
  .mode-tile:hover { color: var(--text); }
  .mode-tile .mt-icon { display: block; font-size: 1.5rem; line-height: 1; margin-bottom: 0.2rem; }
  .mode-tile.active.draw    { background: rgba(239,68,68,0.18);  border-color: var(--draw);    color: white; box-shadow: 0 0 0 1px var(--draw); }
  .mode-tile.active.show    { background: rgba(34,197,94,0.18);  border-color: var(--show);    color: white; box-shadow: 0 0 0 1px var(--show); }
  .mode-tile.active.explain { background: rgba(59,130,246,0.18); border-color: var(--explain); color: white; box-shadow: 0 0 0 1px var(--explain); }
  .mode-tile.active.mix     { background: var(--accent-glow);    border-color: var(--accent);  color: white; box-shadow: 0 0 0 1px var(--accent); }

  /* Unit scope chips */
  .scope-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
  .scope-chip {
    padding: 0.4rem 0.7rem; border-radius: 999px; border: 1.5px solid var(--card-border);
    background: var(--card); color: var(--text-secondary); font-size: 0.75rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .scope-chip:hover { color: var(--text); border-color: var(--accent); }
  .scope-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--text); }

  /* Words-available indicator */
  .words-available {
    margin-top: 0.6rem; padding: 0.6rem 0.9rem; border-radius: 12px;
    background: var(--card); border: 1.5px solid var(--card-border);
    font-size: 0.8rem; color: var(--text-secondary); display: flex;
    justify-content: space-between; align-items: center;
  }
  .words-available .wa-total { font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .words-available .wa-breakdown { font-size: 0.72rem; color: var(--muted); }
  .words-available.empty { background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.4); color: #fca5a5; }

  /* Toggle (time bonus) */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.65rem 0.9rem; background: var(--card);
    border: 1.5px solid var(--card-border); border-radius: 12px;
  }
  .toggle-row .tr-info { font-size: 0.85rem; }
  .toggle-row .tr-info .tr-title { font-weight: 600; color: var(--text); display: block; }
  .toggle-row .tr-info .tr-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; display: block; }
  .toggle-switch {
    width: 44px; height: 26px; background: rgba(255,255,255,0.1);
    border-radius: 999px; cursor: pointer; position: relative;
    transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-switch::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; background: white; border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-switch.on::after { left: 21px; }

  /* Buttons */
  .btn {
    padding: 0.7rem 1.4rem; border: none; border-radius: 12px; font-size: 0.9rem;
    cursor: pointer; font-weight: 600; font-family: inherit;
    transition: transform 0.12s, box-shadow 0.2s, background 0.15s;
    letter-spacing: -0.01em;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(0.97) translateY(0); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #e11d48);
    color: white; box-shadow: 0 2px 12px var(--accent-glow);
  }
  .btn-primary:hover { box-shadow: 0 4px 20px var(--accent-glow); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; transform: none; }
  .btn-secondary {
    background: rgba(255,255,255,0.06); color: var(--text-secondary);
    border: 1.5px solid var(--card-border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .btn-success {
    background: linear-gradient(135deg, var(--show), #16a34a);
    color: white; box-shadow: 0 2px 12px var(--show-glow);
  }
  .btn-success:hover { box-shadow: 0 4px 20px var(--show-glow); }
  .btn-danger {
    background: rgba(239,68,68,0.15); color: #f87171;
    border: 1.5px solid rgba(239,68,68,0.25);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-small { padding: 0.45rem 0.9rem; font-size: 0.8rem; }
  .btn-block { width: 100%; }

  /* Scoreboard */
  .scoreboard {
    width: 100%; background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 16px; padding: 1rem 1.2rem; margin-bottom: 1.2rem;
    backdrop-filter: blur(10px);
  }
  .scoreboard h3 {
    margin-bottom: 0.6rem; font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  .score-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .score-row:last-child { border-bottom: none; }
  .score-row .group-name { font-weight: 600; font-size: 0.9rem; }
  .score-row .score {
    font-size: 1.15rem; font-weight: 800; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .score-row.current {
    background: rgba(244,63,94,0.08); border-radius: 8px;
    padding: 0.5rem 0.7rem; margin: 0.1rem -0.7rem;
    border-bottom-color: transparent;
  }

  /* Game play */
  .timer-bar {
    width: 100%; height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; margin-bottom: 0.8rem; overflow: hidden;
  }
  .timer-fill {
    height: 100%; border-radius: 3px; transition: width 0.1s linear;
    box-shadow: 0 0 10px currentColor;
  }
  .timer-text {
    font-size: 3.5rem; font-weight: 900; margin-bottom: 0.3rem;
    font-variant-numeric: tabular-nums; letter-spacing: -0.04em;
    line-height: 1;
  }
  .timer-text.warning { color: #f59e0b; }
  .timer-text.danger { color: var(--draw); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { to { opacity: 0.4; } }

  .category-label {
    font-size: 0.78rem; font-weight: 700; padding: 0.4rem 1.2rem;
    border-radius: 20px; margin-bottom: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.1em; display: inline-flex; align-items: center; gap: 0.45rem;
  }
  .category-label.draw    { background: rgba(239,68,68,0.20); color: #fca5a5; }
  .category-label.explain { background: rgba(59,130,246,0.20); color: #93c5fd; }
  .category-label.show    { background: rgba(34,197,94,0.20); color: #86efac; }

  .word-card {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 20px; padding: 2.2rem 1.6rem; width: 100%;
    text-align: center; margin-bottom: 1rem; min-height: 130px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    animation: wordPop 0.2s ease-out;
  }
  @keyframes wordPop {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .word-text {
    font-size: 1.7rem; font-weight: 800; line-height: 1.3;
    letter-spacing: -0.02em;
  }
  .word-source {
    font-size: 0.7rem; color: var(--muted); margin-top: 0.6rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;
  }

  .game-actions {
    display: flex; gap: 0.55rem; width: 100%; justify-content: center;
  }
  .game-actions .btn { flex: 1; min-width: 80px; }

  .round-score {
    font-size: 0.9rem; margin-bottom: 0.9rem; color: var(--muted); font-weight: 500;
  }
  .round-score strong {
    color: var(--text); font-size: 1.5rem; font-weight: 800;
    margin-left: 0.15rem;
  }

  /* Round summary */
  .summary-card {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 20px; padding: 2rem 1.5rem; width: 100%;
    text-align: center; margin-bottom: 1.2rem;
    backdrop-filter: blur(10px);
  }
  .summary-card h2 { margin-bottom: 0.3rem; font-weight: 700; font-size: 1.1rem; color: var(--text-secondary); }
  .summary-points {
    font-size: 3.5rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1.1;
    background: linear-gradient(135deg, var(--accent), #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .summary-bonus {
    margin-top: 0.4rem; display: inline-block;
    padding: 0.25rem 0.75rem; border-radius: 999px;
    background: var(--gold-glow); color: var(--gold);
    font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .summary-subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; font-weight: 500; }
  .summary-words {
    margin-top: 1.2rem; text-align: left;
    border-top: 1px solid rgba(255,255,255,0.06); padding-top: 0.8rem;
  }
  .summary-words li {
    padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    list-style: none; display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.9rem; font-weight: 500; gap: 0.5rem;
  }
  .summary-words li:last-child { border-bottom: none; }
  .summary-words .sw-word { display: flex; flex-direction: column; gap: 0.1rem; }
  .summary-words .sw-en { color: var(--text); }
  .summary-words .sw-de { font-size: 0.72rem; color: var(--muted); }
  .summary-words .correct { color: var(--show); font-weight: 700; }
  .summary-words .skipped { color: var(--muted); }

  .action-bar { display: flex; gap: 0.6rem; width: 100%; margin-top: 0.3rem; }
  .action-bar .btn { flex: 1; }

  /* Final screen */
  .final-scores { width: 100%; }
  .final-row {
    display: flex; align-items: center;
    padding: 1rem 1.2rem; background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 14px; margin-bottom: 0.6rem; backdrop-filter: blur(10px);
  }
  .final-row.winner {
    border-color: rgba(250,204,21,0.4);
    background: rgba(250,204,21,0.06);
    box-shadow: 0 4px 20px rgba(250,204,21,0.1);
  }
  .final-row .rank { font-size: 1.6rem; margin-right: 1rem; flex-shrink: 0; }
  .final-row .name { font-weight: 600; flex: 1; font-size: 0.95rem; }
  .final-row .pts {
    font-size: 1.5rem; font-weight: 900; color: var(--accent);
    font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
  }
  .tie-badge {
    margin-left: 0.5rem; padding: 0.15rem 0.5rem; border-radius: 999px;
    background: rgba(255,255,255,0.08); color: var(--text-secondary);
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* Info strip */
  .info-strip {
    display: flex; justify-content: space-between; width: 100%; color: var(--muted);
    font-size: 0.75rem; margin-bottom: 0.6rem; padding: 0 0.2rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* Bottom actions row */
  .bottom-actions {
    margin-top: 1.2rem; display: flex; gap: 0.5rem;
  }

  /* Mobile: hide header during gameplay */
  @media (max-width: 600px) {
    body.playing h1, body.playing .subtitle, body.playing .back-link { display: none; }
    body.playing { padding-bottom: 1rem; }
    body.playing .screen { padding-top: 0.5rem; }
  }

  /* Responsive */
  @media (max-width: 480px) {
    h1 { font-size: 1.6rem; margin-top: 1.0rem; }
    .subtitle { margin-bottom: 1rem; }
    .screen { padding: 0 1rem; }

    .timer-bar { margin-bottom: 0.3rem; }
    .timer-text { font-size: 2.6rem; margin-bottom: 0.1rem; }
    .category-label { margin-bottom: 0.3rem; padding: 0.25rem 0.9rem; font-size: 0.72rem; }
    .round-score { margin-bottom: 0.5rem; font-size: 0.85rem; }
    .round-score strong { font-size: 1.2rem; }
    .word-card { padding: 1.1rem 0.8rem; min-height: 80px; margin-bottom: 0.65rem; border-radius: 16px; }
    .word-text { font-size: 1.35rem; }
    .game-actions { gap: 0.45rem; }
    .game-actions .btn { padding: 1rem 0.5rem; font-size: 1rem; border-radius: 14px; min-height: 52px; }
    .bottom-actions { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .bottom-actions .btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; opacity: 0.6; }

    .seg-btn .seg-icon { font-size: 1.1rem; }

    .scoreboard { padding: 0.8rem 1rem; margin-bottom: 0.8rem; border-radius: 14px; }
    .score-row .group-name { font-size: 0.85rem; }
    .score-row .score { font-size: 1rem; }

    .summary-card { padding: 1.5rem 1.2rem; border-radius: 16px; }
    .summary-points { font-size: 2.8rem; }

    .final-row { padding: 0.8rem 1rem; }
    .final-row .rank { font-size: 1.3rem; margin-right: 0.7rem; }
    .final-row .pts { font-size: 1.3rem; }
  }

  /* Confirmation overlay */
  .overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    justify-content: center; align-items: center;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .overlay.active { display: flex; }
  .overlay-card {
    background: var(--bg2); border: 1.5px solid var(--card-border);
    border-radius: 20px; padding: 2rem;
    max-width: 360px; width: 90%; text-align: center;
    animation: overlayIn 0.2s ease-out;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  @keyframes overlayIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .overlay-card h3 { margin-bottom: 0.6rem; font-weight: 700; font-size: 1.1rem; }
  .overlay-card p { color: var(--text-secondary); margin-bottom: 1.2rem; font-size: 0.85rem; line-height: 1.4; }
  .overlay-actions { display: flex; gap: 0.5rem; }
  .overlay-actions .btn { flex: 1; }

  /* Game history */
  .history-section {
    width: 100%; margin-top: 1.5rem; padding-top: 1.2rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .history-section h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 600; margin-bottom: 0.8rem;
  }
  .history-entry {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 14px; padding: 0.85rem 1rem; margin-bottom: 0.6rem;
    backdrop-filter: blur(10px);
  }
  .history-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.5rem;
  }
  .history-date { font-size: 0.74rem; color: var(--muted); font-weight: 500; }
  .history-delete {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; padding: 0.2rem 0.4rem; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }

</style>
</head>
<body>

<a href="../" class="back-link">← Trainer</a>
<h1>2A <span>Activity</span> Game</h1>
<p class="subtitle">Draw &bull; Show &bull; Explain</p>

<!-- SCREEN: Setup -->
<div id="setup-screen" class="screen active">

  <div class="setup-section">
    <label>Group Names</label>
    <div id="groups-container">
      <div class="group-row">
        <input type="text" placeholder="Group 1" class="group-input" maxlength="30">
        <button onclick="removeGroup(this)" title="Remove">&times;</button>
      </div>
      <div class="group-row">
        <input type="text" placeholder="Group 2" class="group-input" maxlength="30">
        <button onclick="removeGroup(this)" title="Remove">&times;</button>
      </div>
    </div>
    <button class="add-group-btn" onclick="addGroup()">+ Add Group</button>
  </div>

  <div class="setup-section">
    <label>Time per round</label>
    <div class="seg" id="time-seg">
      <button class="seg-btn" data-time="30"><span class="seg-icon">⏱️</span><span class="seg-label">30 s</span></button>
      <button class="seg-btn active" data-time="60"><span class="seg-icon">⏰</span><span class="seg-label">60 s</span></button>
      <button class="seg-btn" data-time="90"><span class="seg-icon">🕰️</span><span class="seg-label">90 s</span></button>
    </div>
  </div>

  <div class="setup-section">
    <label>Mode</label>
    <div class="mode-grid" id="mode-grid">
      <button class="mode-tile" data-mode="draw"><span class="mt-icon">✏️</span>Draw</button>
      <button class="mode-tile" data-mode="show"><span class="mt-icon">🎭</span>Show</button>
      <button class="mode-tile" data-mode="explain"><span class="mt-icon">💬</span>Explain</button>
      <button class="mode-tile active mix" data-mode="mix"><span class="mt-icon">🎲</span>Mix</button>
    </div>
  </div>

  <div class="setup-section">
    <label>Units</label>
    <select id="scope-select"></select>
    <div class="scope-chips" id="scope-chips">
      <button class="scope-chip active" data-scope="all">All units</button>
      <button class="scope-chip" data-scope="1-4">U1–4</button>
      <button class="scope-chip" data-scope="5-8">U5–8</button>
      <button class="scope-chip" data-scope="9-11">U9–11</button>
      <button class="scope-chip" data-scope="12-15">U12–15</button>
    </div>
    <div class="words-available" id="words-available">
      <span><span class="wa-total" id="wa-total">0</span> words available</span>
      <span class="wa-breakdown" id="wa-breakdown"></span>
    </div>
  </div>

  <div class="setup-section">
    <div class="toggle-row" onclick="toggleTimeBonus()">
      <div class="tr-info">
        <span class="tr-title">⭐ Time bonus</span>
        <span class="tr-sub">+1 bonus point if a group clears all words before time runs out</span>
      </div>
      <div class="toggle-switch" id="time-bonus-switch"></div>
    </div>
  </div>

  <button class="btn btn-primary btn-block" onclick="startGame()" id="start-btn">Start Game</button>

  <div class="history-section" id="history-section"></div>
</div>

<!-- SCREEN: Pick / Turn -->
<div id="pick-screen" class="screen">
  <div class="scoreboard" id="pick-scoreboard"></div>
  <div class="info-strip">
    <span id="pick-group-label"></span>
    <span id="words-remaining"></span>
  </div>
  <p style="margin-bottom:0.4rem; font-size:1rem; font-weight:600;" id="pick-prompt"></p>
  <p style="margin-bottom:1rem; font-size:0.82rem; color:var(--muted);" id="pick-mode-info"></p>

  <button class="btn btn-primary btn-block" onclick="startRound()" style="margin-bottom:0.4rem;">Start round →</button>

  <div class="bottom-actions">
    <button class="btn btn-secondary btn-small" onclick="confirmResetGame()">Reset Game</button>
    <button class="btn btn-secondary btn-small" onclick="endGameEarly()">End Game</button>

</div>

<!-- SCREEN: Playing -->
<div id="play-screen" class="screen">
  <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
  <div class="timer-text" id="timer-text" aria-live="assertive">60</div>
  <div class="category-label" id="cat-label"></div>
  <div class="round-score">Round score: <strong id="round-score-num">0</strong></div>
  <div class="word-card">
    <div class="word-text" id="word-text">—</div>
    <div class="word-source" id="word-source"></div>
  </div>
  <div class="game-actions">
    <button class="btn btn-success" onclick="markCorrect()" id="correct-btn">&#10003; Correct</button>
    <button class="btn btn-secondary" onclick="skipWord()">Skip</button>
    <button class="btn btn-danger btn-small" onclick="undoLast()" id="undo-btn" disabled>Undo</button>
  </div>
  <div class="bottom-actions">
    <button class="btn btn-secondary btn-small" onclick="confirmResetRound()">Reset Round</button>
    <button class="btn btn-secondary btn-small" onclick="confirmResetGame()">Reset Game</button>
  </div>
</div>

<!-- SCREEN: Round Summary -->
<div id="summary-screen" class="screen">
  <div class="summary-card">
    <h2 id="summary-group">Group</h2>
    <div class="summary-points" id="summary-points">0</div>
    <p class="summary-subtitle">points this round</p>
    <div id="summary-bonus-wrap" style="display:none;"><span class="summary-bonus">⭐ +1 cleared all words bonus</span></div>
    <ul class="summary-words" id="summary-words"></ul>
  </div>
  <div class="scoreboard" id="summary-scoreboard"></div>
  <div class="action-bar">
    <button class="btn btn-secondary" onclick="undoRound()">&#8617; Undo Round</button>
    <button class="btn btn-primary" onclick="nextTurn()">Next Turn &rarr;</button>
  </div>
</div>

<!-- SCREEN: Final -->
<div id="final-screen" class="screen">
  <h2 style="margin-bottom:1.2rem; font-size:1.5rem; font-weight:800; letter-spacing:-0.03em;">Game Over!</h2>
  <div class="final-scores" id="final-scores"></div>
  <button class="btn btn-primary btn-block" style="margin-top:1.5rem;" onclick="newGame()">New Game</button>
</div>

<!-- Confirmation Overlay -->
<div class="overlay" id="confirm-overlay">
  <div class="overlay-card">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="overlay-actions">
      <button class="btn btn-secondary" onclick="closeOverlay()">Cancel</button>
      <button class="btn btn-danger" id="confirm-action-btn">Confirm</button>
    </div>
  </div>
</div>

<script src="data/activity-words.js"></script>
<script>
'use strict';

// ============================================================
// SETUP STATE (persisted to localStorage)
// ============================================================
const SETUP_KEY = '2a-activity-setup';
const HISTORY_KEY = '2a-activity-history';

const DEFAULT_SETUP = {
  time: 60,
  mode: 'mix',         // 'draw' | 'show' | 'explain' | 'mix'
  scope: 'all',        // 'all' | '1' | '4-7' etc.
  timeBonus: false,
};

let setup = loadSetup();

function loadSetup() {
  try {
    const v = JSON.parse(localStorage.getItem(SETUP_KEY));
    return Object.assign({}, DEFAULT_SETUP, v || {});
  } catch { return Object.assign({}, DEFAULT_SETUP); }
}
function saveSetup() {
  try { localStorage.setItem(SETUP_KEY, JSON.stringify(setup)); } catch {}
}

// ============================================================
// AUDIO (mobile-friendly, on-demand context)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx && AudioCtx) {
    try { audioCtx = new AudioCtx(); } catch {}
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}
function playTone(freq, duration, type='sine', vol=0.3, delay=0) {
  const ctx = getAudio(); if (!ctx) return;
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  osc.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.start(t0); osc.stop(t0 + duration);
}
function playNoise(duration, vol=0.3, delay=0) {
  const ctx = getAudio(); if (!ctx) return;
  const t0 = ctx.currentTime + delay;
  const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2 - 1) * 0.6;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const gain = ctx.createGain();
  src.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  src.start(t0); src.stop(t0 + duration);
}
function sfxCorrect() { playTone(880, 0.10, 'triangle', 0.2, 0); playTone(1320, 0.15, 'triangle', 0.2, 0.06); }
function sfxSkip()    { playTone(440, 0.12, 'sawtooth', 0.12, 0); }
function sfxBeep()    { playTone(660, 0.08, 'sine', 0.18, 0); }
function sfxBuzzer()  { playNoise(0.6, 0.25, 0); playTone(120, 0.6, 'sawtooth', 0.18, 0); }
function sfxBonus()   { playTone(523, 0.12, 'triangle', 0.2, 0); playTone(659, 0.12, 'triangle', 0.2, 0.10); playTone(784, 0.18, 'triangle', 0.2, 0.20); }

// ============================================================
// GAME STATE
// ============================================================
let state = freshState();
function freshState() {
  return {
    groups: [],
    currentGroupIdx: 0,
    currentCategory: null,
    currentMode: 'mix',
    timePerRound: 60,
    timeBonus: false,
    scopeUnits: null,            // array of unit numbers, or null = all
    usedWordKeys: new Set(),
    roundSkippedKeys: new Set(),
    roundWords: [],
    roundScore: 0,
    roundClearedAll: false,
    timer: null,
    timeLeft: 60,
    gameStarted: false,
    roundActive: false,
    currentWord: null,
    history: [],
    roundUndoSnapshot: null,
    historySaved: false,
  };
}

// ============================================================
// BOOTSTRAP
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initSetupScreen();
  renderHistory();
});

// ============================================================
// SETUP SCREEN INITIALIZATION
// ============================================================
function initSetupScreen() {
  // Hydrate setup from saved state
  setActiveTime(setup.time);
  setActiveMode(setup.mode);
  setActiveScope(setup.scope);
  setTimeBonus(setup.timeBonus);

  // Time segmented control
  document.getElementById('time-seg').addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    const t = parseInt(btn.dataset.time, 10);
    setActiveTime(t);
  });

  // Mode picker
  document.getElementById('mode-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-tile');
    if (!btn) return;
    setActiveMode(btn.dataset.mode);
  });

  // Scope chips
  document.getElementById('scope-chips').addEventListener('click', (e) => {
    const btn = e.target.closest('.scope-chip');
    if (!btn) return;
    setActiveScope(btn.dataset.scope);
  });

  // Build the per-unit dropdown
  const sel = document.getElementById('scope-select');
  sel.innerHTML = '';
  const optAll = document.createElement('option'); optAll.value = 'all'; optAll.textContent = 'All units (1–15)'; sel.appendChild(optAll);
  for (let u = 1; u <= 15; u++) {
    const o = document.createElement('option');
    o.value = String(u);
    const title = window.ACTIVITY_UNIT_TITLES && window.ACTIVITY_UNIT_TITLES[u];
    o.textContent = title ? `Unit ${u} · ${title}` : `Unit ${u}`;
    sel.appendChild(o);
  }
  sel.addEventListener('change', (e) => {
    setActiveScope(e.target.value);
    // De-activate range chips when picking single unit
    document.querySelectorAll('.scope-chip').forEach(c => c.classList.remove('active'));
  });

  updateAvailability();
}

function setActiveTime(t) {
  setup.time = t;
  saveSetup();
  document.querySelectorAll('#time-seg .seg-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.time, 10) === t);
  });
}
function setActiveMode(m) {
  setup.mode = m;
  saveSetup();
  document.querySelectorAll('.mode-tile').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m);
  });
  updateAvailability();
}
function setActiveScope(s) {
  setup.scope = s;
  saveSetup();
  document.querySelectorAll('.scope-chip').forEach(c => c.classList.toggle('active', c.dataset.scope === s));
  // Sync the dropdown
  const sel = document.getElementById('scope-select');
  if (sel) {
    if (s === 'all' || /^\d+$/.test(s)) sel.value = s;
    else sel.value = 'all'; // ranges aren't listed individually in the dropdown
  }
  updateAvailability();
}
function setTimeBonus(on) {
  setup.timeBonus = !!on;
  saveSetup();
  document.getElementById('time-bonus-switch').classList.toggle('on', !!on);
}
function toggleTimeBonus() { setTimeBonus(!setup.timeBonus); }

// Compute the active unit set from the scope value.
function activeUnits() {
  if (!setup.scope || setup.scope === 'all') return null; // null means all
  if (/^\d+$/.test(setup.scope)) return [parseInt(setup.scope, 10)];
  const m = setup.scope.match(/^(\d+)-(\d+)$/);
  if (m) {
    const a = parseInt(m[1], 10), b = parseInt(m[2], 10);
    const out = []; for (let i = a; i <= b; i++) out.push(i);
    return out;
  }
  return null;
}

function isInScope(entry) {
  const units = activeUnits();
  if (!units) return true;
  return units.includes(entry.unit);
}

function entryKey(e) { return e.unit + '::' + e.w; }

function updateAvailability() {
  const all = (window.ACTIVITY_WORDS || []).filter(isInScope);
  const counts = { draw: 0, show: 0, explain: 0 };
  for (const e of all) counts[e.cat]++;
  const total = setup.mode === 'mix' ? all.length : counts[setup.mode];
  const wa = document.getElementById('words-available');
  document.getElementById('wa-total').textContent = total;
  document.getElementById('wa-breakdown').textContent =
    `Draw ${counts.draw} · Show ${counts.show} · Explain ${counts.explain}`;
  wa.classList.toggle('empty', total === 0);
  document.getElementById('start-btn').disabled = total === 0;
}

// ============================================================
// SETUP — group rows
// ============================================================
function addGroup() {
  const c = document.getElementById('groups-container');
  const n = c.querySelectorAll('.group-row').length + 1;
  const row = document.createElement('div');
  row.className = 'group-row';
  row.innerHTML = `<input type="text" placeholder="Group ${n}" class="group-input" maxlength="30">
    <button onclick="removeGroup(this)" title="Remove">&times;</button>`;
  c.appendChild(row);
}
function removeGroup(btn) {
  const c = document.getElementById('groups-container');
  if (c.querySelectorAll('.group-row').length <= 2) return;
  btn.parentElement.remove();
}

function startGame() {
  getAudio();
  const all = (window.ACTIVITY_WORDS || []).filter(isInScope);
  const wordsPossible = setup.mode === 'mix' ? all.length : all.filter(w => w.cat === setup.mode).length;
  if (wordsPossible === 0) return;

  const inputs = document.querySelectorAll('.group-input');
  const groups = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `Group ${i + 1}`;
    groups.push({ name, score: 0, correctTotal: 0, skipTotal: 0 });
  });
  if (groups.length < 2) return;

  state = freshState();
  state.groups = groups;
  state.currentGroupIdx = 0;
  state.currentMode = setup.mode;
  state.timePerRound = setup.time;
  state.timeBonus = setup.timeBonus;
  state.scopeUnits = activeUnits();
  state.gameStarted = true;
  showScreen('pick');
}

// ============================================================
// SCREEN ROUTING
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  document.body.classList.toggle('playing', name === 'play');
  window.scrollTo(0, 0);
  if (name === 'setup') { initSetupScreen(); renderHistory(); }
  if (name === 'pick') updatePickScreen();
  if (name === 'final') updateFinalScreen();
}

function updatePickScreen() {
  const g = state.groups[state.currentGroupIdx];
  document.getElementById('pick-prompt').textContent = `${g.name} — your turn!`;
  document.getElementById('pick-group-label').textContent = `Turn: ${g.name}`;
  const remaining = poolForRound().length;
  document.getElementById('words-remaining').textContent = `${remaining} words left`;
  const modeInfo = (state.currentMode === 'mix')
    ? 'Mix mode: each card shows ✏️ Draw, 🎭 Show, or 💬 Explain — do whatever the cue says.'
    : modeDescription(state.currentMode);
  document.getElementById('pick-mode-info').textContent = `${state.timePerRound} s · ${modeInfo}`;
  renderScoreboard('pick-scoreboard');
}
function modeDescription(cat) {
  if (cat === 'draw') return 'Draw the word silently on the board.';
  if (cat === 'show') return 'Mime the word — no talking, no spelling.';
  if (cat === 'explain') return 'Explain in English — never say the word itself.';
  return '';
}

function renderScoreboard(containerId) {
  const el = document.getElementById(containerId);
  let html = '<h3>Scoreboard</h3>';
  state.groups.forEach((g, i) => {
    const cls = i === state.currentGroupIdx ? ' current' : '';
    html += `<div class="score-row${cls}"><span class="group-name">${esc(g.name)}</span><span class="score">${g.score}</span></div>`;
  });
  el.innerHTML = html;
}

// ============================================================
// POOL & WORD SELECTION
// ============================================================
function poolForRound() {
  const all = (window.ACTIVITY_WORDS || []).filter(w => {
    if (state.scopeUnits && !state.scopeUnits.includes(w.unit)) return false;
    if (state.usedWordKeys.has(entryKey(w))) return false;
    if (state.roundSkippedKeys.has(entryKey(w))) return false;
    if (state.currentMode !== 'mix' && w.cat !== state.currentMode) return false;
    return true;
  });
  return all;
}

function startRound() {
  const pool = poolForRound();
  if (pool.length === 0) {
    alert('No words left for this group with the current setup.');
    return;
  }
  state.currentCategory = state.currentMode;
  state.roundWords = [];
  state.roundScore = 0;
  state.history = [];
  state.roundSkippedKeys = new Set();
  state.timeLeft = state.timePerRound;
  state.roundActive = true;
  state.roundClearedAll = false;
  state.beepedSeconds = new Set();

  state.roundUndoSnapshot = {
    usedWordKeys: new Set(state.usedWordKeys),
    groupScore: state.groups[state.currentGroupIdx].score,
    correctTotal: state.groups[state.currentGroupIdx].correctTotal,
    skipTotal: state.groups[state.currentGroupIdx].skipTotal,
  };

  showScreen('play');
  setupPlayScreen();
  nextWord();
  startTimer();
}

function setupPlayScreen() {
  document.getElementById('round-score-num').textContent = '0';
  document.getElementById('undo-btn').disabled = true;
  document.getElementById('summary-bonus-wrap').style.display = 'none';
}

function nextWord() {
  const pool = poolForRound();
  if (pool.length === 0) {
    state.roundClearedAll = true;
    endRound();
    return;
  }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.currentWord = pick;
  document.getElementById('word-text').textContent = pick.w;
  const title = window.ACTIVITY_UNIT_TITLES && window.ACTIVITY_UNIT_TITLES[pick.unit];
  document.getElementById('word-source').textContent = title ? `Unit ${pick.unit} · ${title}` : `Unit ${pick.unit}`;
  // Update category cue (always — in single-mode it's the same; in Mix it's per-word)
  const label = document.getElementById('cat-label');
  label.textContent = catIcon(pick.cat) + ' ' + catNameUpper(pick.cat);
  label.className = 'category-label ' + pick.cat;
  // Timer fill colour follows the active category
  document.getElementById('timer-fill').style.background = catCssVar(pick.cat);
}
function catIcon(cat) { return cat === 'draw' ? '✏️' : cat === 'show' ? '🎭' : '💬'; }
function catNameUpper(cat) { return cat === 'draw' ? 'DRAW' : cat === 'show' ? 'SHOW' : 'EXPLAIN'; }
function catCssVar(cat) { return cat === 'draw' ? 'var(--draw)' : cat === 'show' ? 'var(--show)' : 'var(--explain)'; }

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  clearInterval(state.timer);
  document.getElementById('timer-fill').style.width = '100%';
  state.timer = setInterval(() => {
    state.timeLeft -= 0.1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      clearInterval(state.timer);
      endRound();
    }
    updateTimerDisplay();
  }, 100);
}
function updateTimerDisplay() {
  const secs = Math.ceil(state.timeLeft);
  const el = document.getElementById('timer-text');
  el.textContent = secs;
  el.className = 'timer-text' + (secs <= 5 ? ' danger' : secs <= 10 ? ' warning' : '');
  const pct = (state.timeLeft / state.timePerRound) * 100;
  document.getElementById('timer-fill').style.width = pct + '%';
  if (secs <= 5 && secs >= 1 && !state.beepedSeconds.has(secs) && state.roundActive) {
    state.beepedSeconds.add(secs);
    sfxBeep();
  }
}

// ============================================================
// GAME ACTIONS
// ============================================================
function markCorrect() {
  if (!state.roundActive) return;
  sfxCorrect();
  const w = state.currentWord;
  state.usedWordKeys.add(entryKey(w));
  state.roundWords.push({ w, result: 'correct' });
  state.roundScore++;
  state.history.push({ action: 'correct', w });
  document.getElementById('round-score-num').textContent = state.roundScore;
  document.getElementById('undo-btn').disabled = false;
  nextWord();
}
function skipWord() {
  if (!state.roundActive) return;
  sfxSkip();
  const w = state.currentWord;
  state.roundSkippedKeys.add(entryKey(w));
  state.roundWords.push({ w, result: 'skipped' });
  state.history.push({ action: 'skip', w });
  document.getElementById('undo-btn').disabled = false;
  nextWord();
}
function undoLast() {
  if (state.history.length === 0) return;
  const last = state.history.pop();
  if (last.action === 'correct') {
    state.usedWordKeys.delete(entryKey(last.w));
    state.roundScore--;
    document.getElementById('round-score-num').textContent = state.roundScore;
  } else {
    state.roundSkippedKeys.delete(entryKey(last.w));
  }
  state.roundWords.pop();
  state.currentWord = last.w;
  document.getElementById('word-text').textContent = last.w.w;
  const title = window.ACTIVITY_UNIT_TITLES && window.ACTIVITY_UNIT_TITLES[last.w.unit];
  document.getElementById('word-source').textContent = title ? `Unit ${last.w.unit} · ${title}` : `Unit ${last.w.unit}`;
  const label = document.getElementById('cat-label');
  label.textContent = catIcon(last.w.cat) + ' ' + catNameUpper(last.w.cat);
  label.className = 'category-label ' + last.w.cat;
  document.getElementById('timer-fill').style.background = catCssVar(last.w.cat);
  document.getElementById('undo-btn').disabled = state.history.length === 0;
}

// ============================================================
// END ROUND
// ============================================================
function endRound() {
  clearInterval(state.timer);
  state.roundActive = false;
  if (!state.roundClearedAll) sfxBuzzer();
  let bonus = 0;
  if (state.timeBonus && state.roundClearedAll && state.roundScore > 0) {
    bonus = 1;
    sfxBonus();
  }
  const g = state.groups[state.currentGroupIdx];
  g.score += state.roundScore + bonus;
  g.correctTotal += state.roundScore;
  g.skipTotal += state.roundWords.filter(r => r.result === 'skipped').length;
  state.lastRoundBonus = bonus;
  showScreen('summary');
  updateSummaryScreen();
}

function updateSummaryScreen() {
  const g = state.groups[state.currentGroupIdx];
  document.getElementById('summary-group').textContent = g.name;
  document.getElementById('summary-points').textContent = state.roundScore + (state.lastRoundBonus || 0);
  document.getElementById('summary-bonus-wrap').style.display = state.lastRoundBonus ? '' : 'none';
  const list = document.getElementById('summary-words');
  list.innerHTML = '';
  state.roundWords.forEach(rw => {
    const w = rw.w;
    const cls = rw.result === 'correct' ? 'correct' : 'skipped';
    const icon = rw.result === 'correct' ? '✓' : '—';
    list.innerHTML +=
      `<li><span class="sw-word"><span class="sw-en">${esc(w.w)}</span><span class="sw-de">${esc(w.g)}</span></span><span class="${cls}">${icon}</span></li>`;
  });
  renderScoreboard('summary-scoreboard');
}

function undoRound() {
  if (!state.roundUndoSnapshot) return;
  state.usedWordKeys = state.roundUndoSnapshot.usedWordKeys;
  const g = state.groups[state.currentGroupIdx];
  g.score = state.roundUndoSnapshot.groupScore;
  g.correctTotal = state.roundUndoSnapshot.correctTotal;
  g.skipTotal = state.roundUndoSnapshot.skipTotal;
  state.roundWords = []; state.roundScore = 0; state.roundSkippedKeys = new Set();
  state.history = []; state.roundUndoSnapshot = null; state.lastRoundBonus = 0;
  showScreen('pick');
}

function nextTurn() {
  // Has any word remaining for any group at any category?
  const anyRemaining = (window.ACTIVITY_WORDS || []).some(w => {
    if (state.scopeUnits && !state.scopeUnits.includes(w.unit)) return false;
    if (state.currentMode !== 'mix' && w.cat !== state.currentMode) return false;
    return !state.usedWordKeys.has(entryKey(w));
  });
  if (!anyRemaining) { showScreen('final'); return; }
  state.currentGroupIdx = (state.currentGroupIdx + 1) % state.groups.length;
  showScreen('pick');
}

// ============================================================
// RESET / END
// ============================================================
function confirmResetRound() {
  showOverlay('Reset Round?', 'The timer will restart. Words used this round will stay marked as used.', () => {
    clearInterval(state.timer);
    state.roundActive = false;
    state.roundWords = []; state.roundScore = 0;
    state.roundSkippedKeys = new Set(); state.history = [];
    showScreen('pick');
    closeOverlay();
  });
}
function confirmResetGame() {
  showOverlay('Reset Game?', 'All scores and progress will be lost. Are you sure?', () => {
    clearInterval(state.timer);
    state = freshState();
    closeOverlay();
    showScreen('setup');
  });
}
function endGameEarly() {
  showOverlay('End Game?', 'End the game now and see final scores?', () => {
    clearInterval(state.timer);
    closeOverlay();
    showScreen('final');
  });
}
function newGame() {
  state = freshState();
  showScreen('setup');
}

// ============================================================
// FINAL SCREEN — sorting + tie-breaking
// ============================================================
function updateFinalScreen() {
  if (!state.historySaved) { saveGameToHistory(); state.historySaved = true; }
  // Sort: score desc, then correctTotal desc, then skipTotal asc.
  const sorted = [...state.groups].sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    if (b.correctTotal !== a.correctTotal) return b.correctTotal - a.correctTotal;
    return a.skipTotal - b.skipTotal;
  });
  const maxScore = sorted[0]?.score || 0;
  // Detect rank ties (same score AND same correctTotal AND same skipTotal)
  const tiedAtTop = sorted.filter(g =>
    g.score === sorted[0].score && g.correctTotal === sorted[0].correctTotal && g.skipTotal === sorted[0].skipTotal
  ).length > 1;
  const el = document.getElementById('final-scores');
  const medals = ['🥇', '🥈', '🥉'];
  el.innerHTML = '';
  sorted.forEach((g, i) => {
    const win = g.score === maxScore && maxScore > 0 ? ' winner' : '';
    const rank = medals[i] || `#${i + 1}`;
    const tie = (i === 0 && tiedAtTop) ? '<span class="tie-badge">🤝 Tie</span>' : '';
    el.innerHTML += `<div class="final-row${win}"><span class="rank">${rank}</span><span class="name">${esc(g.name)}${tie}</span><span class="pts">${g.score}</span></div>`;
  });
}

// ============================================================
// OVERLAY
// ============================================================
function showOverlay(title, msg, onConfirm) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-action-btn').onclick = onConfirm;
  document.getElementById('confirm-overlay').classList.add('active');
}
function closeOverlay() {
  document.getElementById('confirm-overlay').classList.remove('active');
}

// ============================================================
// HISTORY (localStorage)
// ============================================================
function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } }
function saveGameToHistory() {
  if (!state.groups.length) return;
  const totalScore = state.groups.reduce((s, g) => s + g.score, 0);
  if (totalScore === 0) return;
  const history = getHistory();
  const maxScore = Math.max(...state.groups.map(g => g.score));
  history.unshift({
    date: new Date().toISOString(),
    mode: state.currentMode,
    time: state.timePerRound,
    scope: state.scopeUnits ? `Units ${state.scopeUnits.join(', ')}` : 'All units',
    wordsUsed: state.usedWordKeys.size,
    teams: state.groups.map(g => ({ name: g.name, score: g.score, winner: g.score === maxScore })),
  });
  if (history.length > 20) history.length = 20;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}
function deleteHistoryEntry(idx) {
  const history = getHistory();
  history.splice(idx, 1);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}
function clearHistory() {
  showOverlay('Clear History?', 'Delete all saved game results?', () => {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
    closeOverlay();
  });
}
function renderHistory() {
  const section = document.getElementById('history-section');
  if (!section) return;
  const history = getHistory();
  if (history.length === 0) {
    section.innerHTML = '<h3>Past Games</h3><p class="history-empty">No games played yet.</p>';
    return;
  }
  let html = '<h3>Past Games</h3>';
  history.forEach((game, idx) => {
    const d = new Date(game.date);
    const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
      + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    const meta = [game.mode ? game.mode.toUpperCase() : null, game.time ? game.time + 's' : null, game.wordsUsed ? game.wordsUsed + ' words' : null]
      .filter(Boolean).join(' · ');
    html += `<div class="history-entry">
      <div class="history-header">
        <span class="history-date">${dateStr}${meta ? ' · ' + meta : ''}</span>
        <button class="history-delete" onclick="deleteHistoryEntry(${idx})" title="Delete">&times;</button>
      </div>
      <div class="history-scores">`;
    game.teams.forEach(t => {
      const winCls = t.winner ? ' ht-winner' : '';
      html += `<div class="history-team${winCls}"><span class="ht-name">${esc(t.name)}</span><span class="ht-score">${t.score}</span></div>`;
    });
    html += '</div></div>';
  });
  html += '<button class="history-clear" onclick="clearHistory()">Clear all history</button>';
  section.innerHTML = html;
}

// ============================================================
// PREVENT PULL-TO-REFRESH (iOS Safari + Android Chrome)
// ============================================================
(function() {
  let startY = 0;
  document.addEventListener('touchstart', function(e) { startY = e.touches[0].pageY; }, { passive: true });
  document.addEventListener('touchmove', function(e) {
    const y = e.touches[0].pageY;
    if (window.scrollY === 0 && y > startY) e.preventDefault();
  }, { passive: false });
})();

// ============================================================
// UTILS
// ============================================================
function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
</script>
</body>
